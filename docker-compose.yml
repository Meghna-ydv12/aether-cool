version: '3.9'

services:
  # PostgreSQL + PostGIS
  db:
    image: postgis/postgis:15-3.4
    container_name: aether-cool-db
    environment:
      POSTGRES_DB: aethercool
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aethercool2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aethercool"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aether-cool-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aether-cool-backend
    environment:
      - DATABASE_URL=postgresql://aether:${DB_PASSWORD:-aethercool2024}@db:5432/aethercool
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - ENV=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend (dev mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aether-cool-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
